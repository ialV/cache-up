services:
  cache-up:
    build: .
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      shared:
        aliases:
          - cache-up

networks:
  shared:
    external: true
